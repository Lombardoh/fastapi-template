services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/checkpoint
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: checkpoint
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d checkpoint"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
